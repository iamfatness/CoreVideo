name: Build

on:
  push:
    branches: ['**']
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0) — leave blank to skip GitHub Release'
        required: false
        default: ''

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Puts dumpbin.exe and lib.exe on PATH - needed to synthesise import libs.
      - name: Set up MSVC tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install OBS Studio
        shell: powershell
        run: |
          $ver = "30.2.2"
          $obs = "C:\obs-runtime"
          $params = @{
            Uri     = "https://github.com/obsproject/obs-studio/releases/download/$ver/OBS-Studio-$ver-Windows.zip"
            OutFile = "obs.zip"
          }
          Invoke-WebRequest @params
          Expand-Archive obs.zip $obs -Force

          # Fast path: portable zip already contains cmake config files
          if (Test-Path "$obs\cmake\LibObs\LibObsConfig.cmake") {
            Write-Host "cmake config files found in portable zip - nothing extra to do."
            exit 0
          }

          Write-Host "Portable zip has no cmake dev files. Bootstrapping from OBS source + DLL exports."

          # Headers: sparse-checkout only libobs + frontend-api
          git clone --depth 1 --branch $ver --filter=blob:none --sparse https://github.com/obsproject/obs-studio.git C:\obs-source
          Push-Location C:\obs-source
          git sparse-checkout set libobs UI/obs-frontend-api
          Pop-Location

          New-Item -Force -ItemType Directory "$obs\include\obs" | Out-Null
          Copy-Item C:\obs-source\libobs\*.h                                    "$obs\include\obs\"
          Copy-Item C:\obs-source\UI\obs-frontend-api\obs-frontend-api.h        "$obs\include\obs\"

          # Import libs: generate from DLL export tables via dumpbin + lib
          New-Item -Force -ItemType Directory "$obs\lib" | Out-Null
          foreach ($name in @("obs", "obs-frontend-api")) {
            $dll = "$obs\bin\64bit\$name.dll"
            $def = "$obs\lib\$name.def"
            $lib = "$obs\lib\$name.lib"
            if (-not (Test-Path $dll)) { Write-Warning "$dll not found - skipping"; continue }

            $exports = @("EXPORTS")
            (dumpbin /nologo /exports $dll) | ForEach-Object {
              # dumpbin lines: "  <ordinal>  <hint>  <RVA>  <name>"
              if ($_ -match "^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)\s*$") {
                $exports += "  $($Matches[1])"
              }
            }
            $exports | Set-Content $def
            lib /nologo /def:$def /out:$lib /machine:x64
          }

          # cmake config files: one per package
          $obsSlash = $obs -replace '\\', '/'
          foreach ($pkg in @(
            @{ name = "LibObs";           target = "OBS::libobs";            dll = "obs"              },
            @{ name = "obs-frontend-api"; target = "OBS::obs-frontend-api";  dll = "obs-frontend-api" }
          )) {
            $dir = "$obs\cmake\$($pkg.name)"
            New-Item -Force -ItemType Directory $dir | Out-Null
            $lines = @(
              "add_library($($pkg.target) SHARED IMPORTED GLOBAL)",
              "set_target_properties($($pkg.target) PROPERTIES",
              "  IMPORTED_IMPLIB   ""$obsSlash/lib/$($pkg.dll).lib""",
              "  IMPORTED_LOCATION ""$obsSlash/bin/64bit/$($pkg.dll).dll""",
              "  INTERFACE_INCLUDE_DIRECTORIES ""$obsSlash/include""",
              ")",
              "set($($pkg.name)_FOUND TRUE)"
            )
            $lines -join "`n" | Set-Content "$dir\$($pkg.name)Config.cmake"
          }

      - name: Install Qt6
        shell: powershell
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.7.3 win64_msvc2019_64 --outputdir C:\Qt
          "QT_ROOT_DIR=C:\Qt\6.7.3\msvc2019_64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download Zoom Windows SDK
        env:
          ZOOM_SDK_DOWNLOAD_URL: ${{ secrets.ZOOM_SDK_WINDOWS_URL }}
        shell: powershell
        run: |
          if ($env:ZOOM_SDK_DOWNLOAD_URL) {
            Invoke-WebRequest $env:ZOOM_SDK_DOWNLOAD_URL -OutFile zoom-sdk.zip
            Expand-Archive zoom-sdk.zip third_party/zoom-sdk-extracted
            $inner = Get-ChildItem third_party/zoom-sdk-extracted -Directory | Select-Object -First 1
            Move-Item $inner.FullName third_party/zoom-sdk
          }

      - name: Configure
        shell: powershell
        run: |
          $cmakeArgs = @(
            '-B', 'build',
            '-G', 'Visual Studio 17 2022',
            '-A', 'x64',
            '-DCMAKE_BUILD_TYPE=Release',
            '-DZOOM_SDK_DIR=third_party/zoom-sdk',
            "-DCMAKE_PREFIX_PATH=C:/obs-runtime;$env:QT_ROOT_DIR",
            '-DLibObs_DIR=C:/obs-runtime/cmake/LibObs',
            '-Dobs-frontend-api_DIR=C:/obs-runtime/cmake/obs-frontend-api',
            "-DZOOM_EMBED_SDK_KEY=${{ secrets.ZOOM_EMBED_SDK_KEY }}",
            "-DZOOM_EMBED_SDK_SECRET=${{ secrets.ZOOM_EMBED_SDK_SECRET }}",
            "-DZOOM_EMBED_JWT_TOKEN=${{ secrets.ZOOM_EMBED_JWT_TOKEN }}"
          )
          cmake @cmakeArgs

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: List build outputs
        if: always()
        shell: powershell
        run: |
          Write-Host "=== build/ tree ==="
          Get-ChildItem -Recurse build -ErrorAction SilentlyContinue |
            Where-Object { -not $_.PSIsContainer } |
            Select-Object FullName,Length |
            Format-Table -AutoSize

      - name: Package (NSIS installer)
        shell: powershell
        run: |
          cd build
          cpack -C Release -G NSIS

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoreVideo-Windows
          path: build/CoreVideo-*.exe
          if-no-files-found: warn

      - name: Upload plugin DLL (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: CoreVideo-Windows-plugin
          path: |
            build/Release/obs-zoom-plugin.dll
            build/Release/ZoomObsEngine.exe
          if-no-files-found: warn

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS Universal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake qt@6
          OBS_VER=30.2.2
          # OBS releases use "OBS-Studio-X.X.X-macOS-Apple.dmg" for arm64
          # and "OBS-Studio-X.X.X-macOS-Intel.dmg" for x86_64.
          # The macos-14 runner is arm64; prefer Apple Silicon, fall back to Intel.
          APPLE_URL="https://github.com/obsproject/obs-studio/releases/download/${OBS_VER}/OBS-Studio-${OBS_VER}-macOS-Apple.dmg"
          INTEL_URL="https://github.com/obsproject/obs-studio/releases/download/${OBS_VER}/OBS-Studio-${OBS_VER}-macOS-Intel.dmg"
          if curl --head --silent --fail "$APPLE_URL" -o /dev/null; then
            curl -fL "$APPLE_URL" -o obs.dmg
          else
            curl -fL "$INTEL_URL" -o obs.dmg
          fi
          hdiutil attach obs.dmg -mountpoint /Volumes/OBS -nobrowse -quiet
          cp -r /Volumes/OBS/OBS.app /tmp/OBS.app
          hdiutil detach /Volumes/OBS -quiet
          # Show cmake layout so failures are diagnosable
          find /tmp/OBS.app -name "*.cmake" | head -20 || true

      - name: Download Zoom macOS SDK
        env:
          ZOOM_SDK_DOWNLOAD_URL: ${{ secrets.ZOOM_SDK_MACOS_URL }}
        run: |
          if [ -n "$ZOOM_SDK_DOWNLOAD_URL" ]; then
            curl -L "$ZOOM_SDK_DOWNLOAD_URL" -o zoom-sdk.zip
            unzip zoom-sdk.zip -d third_party/zoom-sdk-extracted
            mv third_party/zoom-sdk-extracted/$(ls third_party/zoom-sdk-extracted | head -1) third_party/zoom-sdk
          fi

      - name: Configure
        run: |
          OBS_RESOURCES="/tmp/OBS.app/Contents/Resources"
          OBS_CMAKE="$OBS_RESOURCES/cmake"
          QT_PREFIX="$(brew --prefix qt@6)"

          # Probe both flat cmake/ and lib/cmake/ layouts used across OBS versions.
          find_cmake_dir() {
            local config_name="$1"
            for candidate in \
                "$OBS_CMAKE/$config_name" \
                "$OBS_RESOURCES/lib/cmake/$config_name"; do
              if [ -f "$candidate/${config_name}Config.cmake" ]; then
                echo "$candidate"; return
              fi
            done
            echo "$OBS_CMAKE"
          }

          LIBOBS_DIR=$(find_cmake_dir LibObs)
          FRONTEND_DIR=$(find_cmake_dir obs-frontend-api)

          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DZOOM_SDK_DIR=third_party/zoom-sdk \
            "-DCMAKE_PREFIX_PATH=$OBS_RESOURCES;$QT_PREFIX" \
            "-DLibObs_DIR=$LIBOBS_DIR" \
            "-Dobs-frontend-api_DIR=$FRONTEND_DIR" \
            "-DZOOM_EMBED_SDK_KEY=${{ secrets.ZOOM_EMBED_SDK_KEY }}" \
            "-DZOOM_EMBED_SDK_SECRET=${{ secrets.ZOOM_EMBED_SDK_SECRET }}" \
            "-DZOOM_EMBED_JWT_TOKEN=${{ secrets.ZOOM_EMBED_JWT_TOKEN }}"

      - name: Build
        run: cmake --build build --parallel

      - name: List build outputs
        if: always()
        run: |
          echo "=== build/ tree ==="
          find build -maxdepth 3 -type f | head -100 || true

      - name: Package (.dmg)
        run: |
          cd build
          cpack -C Release -G DragNDrop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoreVideo-macOS
          path: build/CoreVideo-*.dmg
          if-no-files-found: warn

      - name: Upload plugin bundle (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: CoreVideo-macOS-plugin
          path: |
            build/obs-zoom-plugin*
            build/ZoomObsEngine*
          if-no-files-found: warn

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release name
        id: release_name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=CoreVideo ${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.event.inputs.version }}"           >> "$GITHUB_OUTPUT"
            echo "pre=${{ contains(github.event.inputs.version, '-') }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=CoreVideo ${{ github.ref_name }}"  >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}"             >> "$GITHUB_OUTPUT"
            echo "pre=${{ contains(github.ref_name, '-') }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_name.outputs.tag }}
          name: ${{ steps.release_name.outputs.name }}
          draft: false
          prerelease: ${{ steps.release_name.outputs.pre == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/CoreVideo-Windows/*.exe
            artifacts/CoreVideo-macOS/*.dmg
