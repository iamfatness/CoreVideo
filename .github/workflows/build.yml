name: Build

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install OBS Studio (for headers + libs)
        run: |
          $ver = "30.2.2"
          Invoke-WebRequest -Uri "https://github.com/obsproject/obs-studio/releases/download/$ver/OBS-Studio-$ver-Windows.zip" -OutFile obs.zip
          Expand-Archive obs.zip -DestinationPath C:\obs-studio
        shell: powershell

      - name: Download Zoom Windows SDK
        env:
          ZOOM_SDK_DOWNLOAD_URL: ${{ secrets.ZOOM_SDK_WINDOWS_URL }}
        run: |
          if ("$env:ZOOM_SDK_DOWNLOAD_URL" -ne "") {
            Invoke-WebRequest -Uri $env:ZOOM_SDK_DOWNLOAD_URL -OutFile zoom-sdk.zip
            Expand-Archive zoom-sdk.zip -DestinationPath third_party/zoom-sdk-extracted
            # Move contents to expected path
            $inner = Get-ChildItem third_party/zoom-sdk-extracted -Directory | Select-Object -First 1
            Move-Item $inner.FullName third_party/zoom-sdk
          }
        shell: powershell

      - name: Configure
        run: >
          cmake -B build -G "Visual Studio 17 2022" -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DZOOM_SDK_DIR=third_party/zoom-sdk
          -DCMAKE_PREFIX_PATH="C:/obs-studio"
          -DZOOM_EMBED_SDK_KEY="${{ secrets.ZOOM_EMBED_SDK_KEY }}"
          -DZOOM_EMBED_SDK_SECRET="${{ secrets.ZOOM_EMBED_SDK_SECRET }}"
          -DZOOM_EMBED_JWT_TOKEN="${{ secrets.ZOOM_EMBED_JWT_TOKEN }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (NSIS installer)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd build
          cpack -C Release -G NSIS

      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: CoreVideo-Windows
          path: build/CoreVideo-*.exe

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS Universal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake qt@6
          # Download OBS Studio (for headers + libs)
          OBS_VER=30.2.2
          curl -L "https://github.com/obsproject/obs-studio/releases/download/${OBS_VER}/obs-studio-${OBS_VER}-macos-arm64.dmg" -o obs.dmg
          hdiutil attach obs.dmg -mountpoint /Volumes/OBS -nobrowse -quiet
          cp -r /Volumes/OBS/OBS.app /tmp/OBS.app
          hdiutil detach /Volumes/OBS -quiet

      - name: Download Zoom macOS SDK
        env:
          ZOOM_SDK_DOWNLOAD_URL: ${{ secrets.ZOOM_SDK_MACOS_URL }}
        run: |
          if [ -n "$ZOOM_SDK_DOWNLOAD_URL" ]; then
            curl -L "$ZOOM_SDK_DOWNLOAD_URL" -o zoom-sdk.zip
            unzip zoom-sdk.zip -d third_party/zoom-sdk-extracted
            mv third_party/zoom-sdk-extracted/$(ls third_party/zoom-sdk-extracted | head -1) third_party/zoom-sdk
          fi

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
          -DZOOM_SDK_DIR=third_party/zoom-sdk
          -DCMAKE_PREFIX_PATH="/tmp/OBS.app/Contents/Resources;$(brew --prefix qt@6)"
          -DZOOM_EMBED_SDK_KEY="${{ secrets.ZOOM_EMBED_SDK_KEY }}"
          -DZOOM_EMBED_SDK_SECRET="${{ secrets.ZOOM_EMBED_SDK_SECRET }}"
          -DZOOM_EMBED_JWT_TOKEN="${{ secrets.ZOOM_EMBED_JWT_TOKEN }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Package (.pkg)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd build
          cpack -C Release -G productbuild

      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: CoreVideo-macOS
          path: build/CoreVideo-*.pkg

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: CoreVideo ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/CoreVideo-Windows/*.exe
            artifacts/CoreVideo-macOS/*.pkg
